name: REUSE Compliance Check

on:
  push:
    branches: 
      - "main"
  pull_request:
    branches: 
      - "main"

jobs:
  check-reuse-compliance:
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v6

    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6.0.0