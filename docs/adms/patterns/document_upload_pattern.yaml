name: document_upload_pattern
version: "1.0"
description: >
  Upload a new document and link it to a business object in SAP ADM.
  Handles the full lifecycle: create relation → generate presigned URLs →
  poll for virus scan completion before signalling success to the user.

intent_keywords:
  - upload document
  - attach file
  - add attachment
  - store document
  - link document to business object
  - create document

required_apis:
  - step: 1
    id: create_relation
    api: "client.relations.create"
    description: >
      Atomically create a Document and DocumentRelation via the
      CreateDocumentWithRelation OData action.
    input_schema:
      type: CreateDocumentRelationInput
      required_fields:
        - business_object_node_type_unique_id
        - host_business_object_node_id
        - document.document_name
        - document.document_base_type
      optional_fields:
        - document.document_type_id
        - is_active_entity
    output: DocumentRelation (with embedded Document containing upload URLs)
    depends_on: []

  - step: 2
    id: upload_to_presigned_url
    api: "external_http_put"
    description: >
      Upload file bytes directly to the presigned URL(s) in
      document.document_content_upload_urls using HTTP PUT.
      This is outside the SDK — use requests/httpx directly.
    input: document.document_content_upload_urls[0]
    note: SDK is not involved in the actual upload I/O.
    depends_on: [create_relation]

  - step: 3
    id: poll_scan_status
    api: "client.documents.get"
    description: >
      Poll the document's DocumentState until it reaches CLEAN or a terminal
      error state.  DO NOT present a download URL until state == CLEAN.
    poll_interval_seconds: 5
    max_polls: 12
    terminal_states:
      - CLEAN
      - INFECTED
      - SCAN_FAILED
    depends_on: [upload_to_presigned_url]

validation_rules:
  - rule: "document_name must not be empty"
    field: document.document_name
  - rule: "document_base_type must be a valid BaseType enum value"
    field: document.document_base_type
    allowed_values: [DOCUMENT, LINK, PHYSICAL_DOCUMENT]
  - rule: "host_business_object_node_id must not be empty"
    field: host_business_object_node_id
  - rule: "Never present download URL before DocumentState == CLEAN"
    security: true

error_handling:
  - error: DocumentNotFoundError
    action: log and surface to user — relation/document was deleted concurrently
  - error: ScanNotCleanError
    action: inform user that the document is under virus scan or was blocked
  - error: HttpError
    action: retry with exponential backoff (max 3 attempts), then surface error

use_cases:
  - "Attach an invoice PDF to a Purchase Order"
  - "Store a contract PDF linked to a Contract business object"
  - "Upload a drawing and attach it to a Work Order"
  - "LangGraph node: upload user-provided attachment to ADM"
