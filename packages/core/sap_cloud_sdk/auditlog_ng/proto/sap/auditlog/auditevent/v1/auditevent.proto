syntax = "proto3";
package sap.auditlog.auditevent.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc/gen/jsonschema/v1/options.proto";

option go_package = "sap.com/auditlog/auditevent";

// Metadata
// contains information that are attached to all events.
message Metadata {
  string ts = 1 [(protoc.gen.jsonschema.v1.field_options).required = true]; // Required format: 2023-10-23T10:00:00.000Z
  repeated string source_ip = 2; // IPv4 or IPv6
  string user_impersonated_id = 3;
  string user_initiator_id = 4;
  string app_id = 5;
  string tenant_id = 6;
  string user_session_context_id = 7;
  map<string, string> app_context = 8;
  Infrastructure infrastructure = 9;
  Platform platform = 10;

  message Infrastructure {
    oneof runtime {
      option (buf.validate.oneof).required = true;

      Kubernetes k8s = 1;
      CloudFoundry cf = 2;
      Other other = 3;
    }
    App app = 4;

    message Kubernetes {
      string infrastructure_region = 1;
      string cluster = 2;
      string node = 3;
      string pod = 4;
    }

    message CloudFoundry {
      string btpregion = 1;
      string org_id = 2;
      string space_id = 3;
      string app_id = 4;
    }

    message Other {
      string runtime_type = 1;
    }

    message App {
      string image = 1;
      string version = 2;
    }
  }

  message Platform {
    oneof platform {
      option (buf.validate.oneof).required = true;

      BTP btp = 1;
      UnifiedServices unified_services = 2;
      Other other = 3;
    }

    message BTP {
      string global_account_id = 1;
      string sub_account_id = 2;
    }

    message UnifiedServices {
      string account_id = 1;
      string folder_path = 2;
      string resourcegroup_path = 3;
    }

    message Other {
      string platform_name = 1;
    }
  }
}

