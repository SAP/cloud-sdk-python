syntax = "proto3";
package sap.auditlog.auditevent.v2;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "sap.com/auditlog/auditevent";

// Common Fields
// contains information that are attached to all events.
message Common {
  //timestamp of the event
  google.protobuf.Timestamp timestamp = 1; // Required format: 2023-10-23T10:00:00.000Z
  //IP Adress of the source in IPv4 or IPv6
  repeated string source_ip = 2; // IPv4 or IPv6
  //contains the local user ID, which is used in case of impersonation
  string user_impersonated_id = 3;
  //contains the local user ID, who caused the audit log event
  string user_initiator_id = 4;
  string app_id = 5;
  //tenant ID of the source
  string tenant_id = 6;
  string user_session_context_id = 7;
  map<string, string> app_context = 8;
}

/* AuditlogClear
 *   @EventShortText: "Audit Log has been deleted"
 *   @EventCode: "AE-0001"
 *   @EventCategoryCode: "EVENT_CATEGORY_CODE_CFG"
 *   @EventMessageText: "Audit Log has been deleted (event count: ${number_of_events})"
 *   @EventDocumentation: "The Audit log has been deleted and is no longer available. The number of events has been deleted."
 */
message AuditlogClear {
  Common common = 1;
  int32 number_of_events = 2;
}

